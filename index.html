<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daily Success Tracker</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1c1c1c);
      background-size:400% 400%;
      animation: gradient 12s ease infinite;
      overflow:hidden;
    }

    @keyframes gradient{
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }

    .container{
      width:90%;
      max-width:500px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(15px);
      border:1px solid rgba(255,255,255,0.2);
      border-radius:25px;
      padding:30px;
      box-shadow:0 8px 32px rgba(0,0,0,0.3);
      color:white;
    }

    h1{
      text-align:center;
      margin-bottom:25px;
      font-size:2rem;
      letter-spacing:1px;
    }

    .task{
      display:flex;
      align-items:center;
      justify-content:space-between;
      background: rgba(255,255,255,0.08);
      padding:18px;
      border-radius:15px;
      margin-bottom:15px;
      transition:0.3s;
    }

    .task:hover{
      transform:scale(1.03);
      background: rgba(255,255,255,0.15);
    }

    .task label{
      font-size:1.05rem;
      cursor:pointer;
      width:100%;
      margin-left:10px;
    }

    input[type="checkbox"]{
      width:22px;
      height:22px;
      cursor:pointer;
      accent-color:#00ffcc;
    }

    .completed{
      text-decoration:line-through;
      opacity:0.6;
    }

    .progress-container{
      margin-top:25px;
    }

    .progress-text{
      margin-bottom:10px;
      font-size:1rem;
    }

    .progress-bar{
      width:100%;
      height:20px;
      background:#ffffff22;
      border-radius:20px;
      overflow:hidden;
    }

    .progress{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#00ffcc,#00c3ff);
      transition:0.4s;
    }

    .quote{
      margin-top:25px;
      text-align:center;
      font-style:italic;
      color:#d9faff;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🌟 Daily Success Tracker</h1>

    <div class="task">
      <input type="checkbox" id="task1" onchange="updateProgress()">
      <label for="task1">💪 Move Your Body & Exercise</label>
    </div>

    <div class="task">
      <input type="checkbox" id="task2" onchange="updateProgress()">
      <label for="task2">📚 Read 10 Pages of a Book</label>
    </div>

    <div class="task">
      <input type="checkbox" id="task3" onchange="updateProgress()">
      <label for="task3">💧 Drink 3 Liters of Water</label>
    </div>

    <div class="task">
      <input type="checkbox" id="task4" onchange="updateProgress()">
      <label for="task4">🧠 Deep Study Session</label>
    </div>

    <div class="task">
      <input type="checkbox" id="task5" onchange="updateProgress()">
      <label for="task5">🧘 Meditation</label>
    </div>

    <div class="progress-container">
      <div class="progress-text">
        Progress: <span id="progressText">0%</span>
      </div>

      <div class="progress-bar">
        <div class="progress" id="progressBar"></div>
      </div>
    </div>

    <div class="quote">
      “Small daily improvements create massive long-term success.”
    </div>
  </div>

  <script>
    function updateProgress() {
      const checkboxes = document.querySelectorAll('input[type="checkbox"]');
      const total = checkboxes.length;

      let checked = 0;

      checkboxes.forEach((checkbox) => {
        const label = document.querySelector(`label[for="${checkbox.id}"]`);

        if (checkbox.checked) {
          checked++;
          label.classList.add("completed");
        } else {
          label.classList.remove("completed");
        }
      });

      const percent = (checked / total) * 100;

      document.getElementById("progressBar").style.width = percent + "%";
      document.getElementById("progressText").innerText = Math.round(percent) + "%";

      // Save progress
      localStorage.setItem("dailyProgress", JSON.stringify(
        Array.from(checkboxes).map(cb => cb.checked)
      ));
    }

    // Load saved progress
    window.onload = function() {
      const saved = JSON.parse(localStorage.getItem("dailyProgress"));

      if(saved){
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');

        checkboxes.forEach((checkbox, index) => {
          checkbox.checked = saved[index];
        });

        updateProgress();
      }
    }
  </script>

</body>
</html>
